apiVersion: v1
kind: ServiceAccount
metadata:
  name: jjobs-agent
  namespace: default
  annotations:
    # IRSA(IAM Roles for Service Accounts) 활성화 시 IAM Role ARN을 입력한다.
    # 다중 EKS 클러스터를 sts:AssumeRoleWithWebIdentity 흐름으로 접근하려면 이 Role이 필요하다.
    # 단일 클러스터 환경에서는 아래 annotation을 비워두거나 주석 처리한다.
    # eks.amazonaws.com/role-arn: arn:aws:iam::<input_your_account_id>:role/<input_your_irsa_role_name>
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: batch
  namespace: default
rules:
- apiGroups: [ "" ]
  resources: [ "pods", "pods/log"]
  verbs: [ "get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [ "batch" ]
  resources: [ "jobs" ]
  verbs: [ "get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jjobs-agent-batch
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: batch
subjects:
- kind: ServiceAccount
  name: jjobs-agent
  namespace: default
